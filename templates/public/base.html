<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ligasoftware{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #f7f7f7;
            color: #222;
        }

        header {
            margin-bottom: 30px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #005bbb;
        }

        .card {
            background: white;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dart Liga</h1>
        <nav>
            <a href="{% url 'home' %}">Start</a>
            <a href="{% url 'league_list' %}">Ligen</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    {% block content %}{% endblock %}
</body>
</html>
